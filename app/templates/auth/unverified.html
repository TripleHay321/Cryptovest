{% extends 'base.html' %}
{% block title %}Verify Email{% endblock %}

{% block content %}
<section class="page-section">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-6">
                <div class="auth-card">
                    <span class="badge-premium mb-3">
                        <i class="bi bi-envelope-check"></i> Email Verification Required
                    </span>

                    <h1 class="section-title mb-3">Verify your email</h1>
                    <p class="text-muted-premium mb-4">
                        We sent a verification link to <strong>{{ email }}</strong>.
                        Please click that link before logging in.
                    </p>

                    <form method="POST" action="{{ url_for('auth.resend_verification') }}">
                        {{ form.hidden_tag() }}
                        <input type="hidden" name="email" value="{{ email }}">
                        <button type="submit" class="btn btn-premium">Resend Verification Email</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
